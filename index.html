<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Seguridad del sistema</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

#box{
max-width:400px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
background:#2e7d32;
color:white;
border-radius:8px;
cursor:pointer;
}

#scanBox{
display:none;
margin-top:20px;
}

#barBg{
width:100%;
background:#333;
height:25px;
}

#bar{
width:0%;
height:25px;
background:#00ff00;
transition:width 0.3s;
}

#log{
margin-top:15px;
font-size:14px;
height:60px;
}

#troll{
display:none;
font-size:60px;
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(5px,-5px);}
50%{transform:translate(-5px,5px);}
75%{transform:translate(5px,5px);}
100%{transform:translate(-5px,-5px);}
}

</style>
</head>

<body>

<div id="box">

<h2>⚠ Se han detectado 2 virus en su teléfono</h2>
<p>Se recomienda realizar un escaneo para proteger el sistema.</p>

<button onclick="scan()">Escanear</button>

<div id="scanBox">

<p>Escaneando sistema...</p>

<div id="barBg">
<div id="bar"></div>
</div>

<div id="log"></div>

</div>

<div id="troll">
Ooops, tu información personal ha sido filtrada.
</div>

</div>

<audio id="sound" loop>
<source src="Extreme Distorted Bass (Triggered Meme)  Sound Effect for editing.m4a" type="audio/mp4">
</audio>

<script>

function openFullscreen(){
let elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}else if(elem.webkitRequestFullscreen){
elem.webkitRequestFullscreen();
}else if(elem.msRequestFullscreen){
elem.msRequestFullscreen();
}
}

function vibrar(){
if(navigator.vibrate){
navigator.vibrate([300,100,300]);
}
}

function scan(){

openFullscreen();

document.querySelector("button").style.display="none";

document.getElementById("scanBox").style.display="block";

let progress=0;

let mensajes=[
"Analizando archivos...",
"Buscando vulnerabilidades...",
"Accediendo a almacenamiento...",
"Revisando fotos...",
"Descargando datos...",
"Accediendo a contactos..."
];

let interval=setInterval(()=>{

progress+=Math.random()*18;

document.getElementById("bar").style.width=progress+"%";

document.body.style.background=
`rgb(${Math.random()*255},
${Math.random()*255},
${Math.random()*255})`;

document.getElementById("log").innerText=
mensajes[Math.floor(Math.random()*mensajes.length)];

vibrar();

if(progress>=100){

clearInterval(interval);

document.querySelector("h2").style.display="none";
document.querySelector("p").style.display="none";
document.getElementById("scanBox").style.display="none";

document.getElementById("troll").style.display="block";

// 🔊 EL AUDIO SUENA AQUÍ (al final)
let audio=document.getElementById("sound");
audio.volume=1;
audio.play().catch(()=>{});

}

},400);

// bloquear botón atrás
history.pushState(null,null,location.href);

window.onpopstate=function(){
history.pushState(null,null,location.href);
};

// aviso al salir
window.onbeforeunload=function(){
return "SI SALES TU INFORMACIÓN SE BORRARA";
};

}

</script>

</body>
</html>
