<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Seguridad del sistema</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

#box{
max-width:400px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
background:#2e7d32;
color:white;
border-radius:8px;
cursor:pointer;
}

#troll{
display:none;
font-size:60px;
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(5px,-5px);}
50%{transform:translate(-5px,5px);}
75%{transform:translate(5px,5px);}
100%{transform:translate(-5px,-5px);}
}
</style>
</head>

<body>

<div id="box">

<h2>⚠ Se han detectado 2 virus en su teléfono</h2>
<p>Se recomienda realizar un escaneo para proteger el sistema.</p>

<button onclick="scan()">Escanear</button>

<div id="troll">Ooops, tu información personal ha sido filtrada.</div>

</div>

<audio id="sound" loop>
<source src="Extreme Distorted Bass (Triggered Meme)  Sound Effect for editing.m4a" type="audio/mp4">
</audio>

<script>

function scan(){

document.getElementById("sound").play().catch(()=>{});

document.querySelector("h2").style.display="none";
document.querySelector("p").style.display="none";
document.querySelector("button").style.display="none";

document.getElementById("troll").style.display="block";

// colores locos
setInterval(()=>{
document.body.style.background =
`rgb(${Math.random()*255},
${Math.random()*255},
${Math.random()*255})`;
},120);

// bloquear botón atrás
history.pushState(null,null,location.href);
window.onpopstate=function(){
history.pushState(null,null,location.href);
};

}

</script>

</body>
</html>
